<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>담하로</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../assets/style.css">
<style>
:root {
  --c-normal:      #285398;
  --c-holiday:     #f87171;
  --c-special:     #60a5fa;
  --c-anniversary: #c084fc;
}

/* ── MONTH NAV ── */
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.month-nav h2 {
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 22px; font-weight: 700; color: var(--primary-deep);
}
.nav-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--white); border: 1.5px solid var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; color: var(--primary);
  box-shadow: var(--shadow);
}
.nav-btn:hover { background: var(--primary-pale); border-color: var(--primary); }

/* ── LEGEND ── */
.legend {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-bottom: 20px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* ── CALENDAR ── */
.cal-wrap { display: block; }
.cal-header-row {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 4px;
  margin-bottom: 4px;
}
.cal-header-cell {
  text-align: center; font-size: 12px; font-weight: 700;
  color: var(--text-muted); padding: 6px 0;
}
.cal-header-cell:first-child { color: #ef4444; }
.cal-header-cell:last-child  { color: #3b82f6; }

.cal-grid { display: grid; grid-template-columns: repeat(7,minmax(0,1fr)); gap: 4px; }
.cal-cell {
  min-height: 88px; background: var(--white);
  border: 1px solid var(--gray-200); border-radius: 12px;
  padding: 6px 8px; transition: all .2s; cursor: default;
}
.cal-cell:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-cell.empty:hover { box-shadow: none; border-color: transparent; }
.cal-cell.today { border-color: var(--primary); box-shadow: 0 0 0 1.5px var(--primary); }
.cal-cell.past  { opacity: .45; }
.cal-day-num { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.cal-cell.sun .cal-day-num { color: #ef4444; }
.cal-cell.sat .cal-day-num { color: #3b82f6; }
.cal-cell.today .cal-day-num {
  background: var(--primary); color: #fff;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.cal-event {
  font-size: 11px; padding: 2px 6px; border-radius: 6px;
  margin-bottom: 2px; color: #fff; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer; transition: opacity .2s;
  max-width: 100%; display: block; width: 100%;
}
.cal-event:hover { opacity: .85; }
/* 기념일 글로우 */
.cal-event.anniversary-glow {
  animation: anniv-pulse 2s ease-in-out infinite;
}
@keyframes anniv-pulse {
  0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--glow-color, #c084fc) 50%, transparent); }
  50%      { box-shadow: 0 0 14px 5px color-mix(in srgb, var(--glow-color, #c084fc) 45%, transparent); }
}

/* ── LIST VIEW (mobile) ── */
.list-wrap { display: none; }
.list-group { margin-bottom: 16px; }
.list-date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 0 4px; }
.list-day-badge {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--white); border: 1px solid var(--gray-200);
  font-weight: 800; font-size: 15px; line-height: 1; color: var(--text);
}
.list-day-badge.today  { background: var(--primary); color: #fff; border-color: var(--primary); }
.list-day-badge.sun    { color: #ef4444; }
.list-day-badge.sat    { color: #3b82f6; }
.list-day-badge.today.sun, .list-day-badge.today.sat { color: #fff; }
.list-dow { font-size: 12px; color: var(--text-muted); font-weight: 600; }
.list-event {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; background: var(--white);
  border: 1.5px solid var(--gray-200); border-radius: 14px;
  margin-bottom: 6px; cursor: pointer; transition: all .2s;
  box-shadow: var(--shadow);
}
.list-event:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: var(--accent); }
.list-bar { width: 3px; height: 32px; border-radius: 2px; flex-shrink: 0; }
.list-title { font-size: 14px; font-weight: 600; }
.list-time  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.list-group.past { opacity: .45; }
.today-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0 14px;
}
.today-divider::before, .today-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
}
.today-divider span { font-size: 11px; font-weight: 800; color: var(--primary); letter-spacing: 1.5px; }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15,37,72,.3); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal-box {
  background: var(--white); border-radius: 22px;
  padding: 28px; max-width: 380px; width: 90%;
  box-shadow: 0 20px 60px rgba(15,37,72,.18);
  border: 1.5px solid var(--gray-200);
}
.modal-close {
  float: right; background: none; border: none;
  font-size: 18px; cursor: pointer; color: var(--text-muted);
}

@media (max-width: 768px) {
  .cal-wrap  { display: none; }
  .list-wrap { display: block; }
  .legend    { display: none; }
}
</style>
</head>
<body style="display:flex;flex-direction:column;min-height:100vh">

<nav class="nav">
  <div class="nav-inner">
    <a href="../" class="nav-logo">🌊 담하로</a>
    <a href="../schedule/" class="nav-link active">📅 일정</a>
    <a href="../songbook/" class="nav-link">🎵 노래책</a>
    <a href="../upbo/" class="nav-link">⚡ 업보</a>
  </div>
</nav>

<main class="container" style="flex:1;max-width:860px">
  <div class="page-header fade-up">
    <h1>📅 방송 일정</h1>
    <p>오후 1:30 또는 오후 11:00 방송 예정</p>
  </div>

  <div class="month-nav fade-up">
    <button class="nav-btn" onclick="changeMonth(-1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2 id="calMonth"></h2>
    <button class="nav-btn" onclick="changeMonth(1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="legend fade-up">
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-normal)"></div>방송</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-holiday)"></div>휴방</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-special)"></div>특별방송</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--c-anniversary)"></div>기념일</div>
  </div>

  <!-- 데스크탑: 캘린더 -->
  <div class="cal-wrap fade-up">
    <div class="cal-header-row">
      <div class="cal-header-cell">일</div><div class="cal-header-cell">월</div>
      <div class="cal-header-cell">화</div><div class="cal-header-cell">수</div>
      <div class="cal-header-cell">목</div><div class="cal-header-cell">금</div>
      <div class="cal-header-cell">토</div>
    </div>
    <div class="cal-grid" id="calBody"></div>
  </div>

  <!-- 모바일: 리스트 -->
  <div class="list-wrap fade-up" id="listBody"></div>
</main>

<!-- 상세 모달 -->
<div class="modal-backdrop" id="eventModal" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="document.getElementById('eventModal').classList.remove('open')">✕</button>
    <div style="margin-bottom:14px">
      <span id="modalDot" style="display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle"></span>
      <span id="modalType" style="font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase"></span>
    </div>
    <div id="modalTitle" style="font-size:18px;font-weight:800;margin-bottom:8px;color:var(--text);font-family:'Gowun Dodum',sans-serif"></div>
    <div id="modalDate"  style="font-size:13px;color:var(--text-muted);margin-bottom:4px"></div>
    <div id="modalTime"  style="font-size:13px;color:var(--text-muted);margin-bottom:10px"></div>
    <div id="modalNote"  style="font-size:13px;color:var(--text);line-height:1.7"></div>
  </div>
</div>

<footer style="background:var(--primary-deep);color:rgba(255,255,255,.45);text-align:center;padding:20px 24px;font-size:.8rem;">
  <p>© 2026 담하로</p>
  <p style="margin-top:6px;font-size:11px;color:rgba(255,255,255,.3);">Designed &amp; Developed by <strong style="color:rgba(255,255,255,.45);">아키텍트 크리에이티브</strong> · <a href="mailto:profile@soop.info" style="color:rgba(255,255,255,.3);text-decoration:none;">profile@soop.info</a></p>
</footer>

<script>
const SUPABASE_URL = 'https://mvpwyshztjttmdfbuuea.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12cHd5c2h6dGp0dG1kZmJ1dWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODMyNjgsImV4cCI6MjA5NTc1OTI2OH0.Jdd4nbHouFMbfC10OZfZVSJq_gGPCWIysS1pfeaBP-E';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const DOW = ['일','월','화','수','목','금','토'];

// 유형별 색상 — 기념일은 CSS var로 분리 (원하는 색으로 교체)
const TYPE_COLOR = {
  normal:      '#285398',
  holiday:     '#f87171',
  special:     '#60a5fa',
  anniversary: '#c084fc'
};
const TYPE_LABEL = {
  normal:      '방송',
  holiday:     '휴방',
  special:     '특별방송',
  anniversary: '기념일'
};

let curYear, curMonth, schedules = [];

function init() {
  const n = new Date();
  curYear = n.getFullYear();
  curMonth = n.getMonth();
  loadMonth();
}

async function loadMonth() {
  document.getElementById('calMonth').textContent = `${curYear}년 ${curMonth+1}월`;
  const from = `${curYear}-${String(curMonth+1).padStart(2,'0')}-01`;
  const last = new Date(curYear, curMonth+1, 0).getDate();
  const to   = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  try {
    const { data } = await sb.from('schedules').select('*').gte('date', from).lte('date', to).order('date');
    schedules = data || [];
  } catch(e) { schedules = []; }
  renderCalendar();
  renderList();
}

function getColor(s) {
  if(s.status==='anniversary' && s.anniversary_color) return s.anniversary_color;
  return TYPE_COLOR[s.status] || TYPE_COLOR.normal;
}

// 날짜 row에서 이벤트 배열 생성 (slot1, slot2 → 개별 이벤트로)
function getEvents(row) {
  const evs = [];
  if (row.status === 'holiday') {
    evs.push({ title: '휴방', time: '', color: TYPE_COLOR.holiday, status: 'holiday', note: row.note });
    return evs;
  }
  if (row.status === 'anniversary') {
    evs.push({ title: row.note || '기념일', time: '', color: TYPE_COLOR.anniversary, status: 'anniversary', note: row.note, glow: true });
    return evs;
  }
  if (row.slot1_title) evs.push({ title: row.slot1_title, time: row.slot1_time || '', color: getColor(row), status: row.status, note: row.note });
  if (row.slot2_title) evs.push({ title: row.slot2_title, time: row.slot2_time || '', color: getColor(row), status: row.status, note: row.note });
  if (!evs.length && row.date) evs.push({ title: '방송', time: '', color: getColor(row), status: row.status, note: row.note });
  return evs;
}

function renderCalendar() {
  const body = document.getElementById('calBody');
  body.innerHTML = '';
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const today = new Date();
  const dow = d => new Date(curYear, curMonth, d).getDay();

  for (let i = 0; i < firstDay; i++) body.innerHTML += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()===d;
    const isPast  = new Date(ds+'T23:59:59') < today && !isToday;
    const row = schedules.find(s => s.date === ds);
    const evs = row ? getEvents(row) : [];
    const w = dow(d);

    let cls = 'cal-cell';
    if (w===0) cls += ' sun';
    if (w===6) cls += ' sat';
    if (isToday) cls += ' today';
    if (isPast)  cls += ' past';

    let numHtml = `<div class="cal-day-num">${d}</div>`;
    if (isToday) numHtml = `<div class="cal-day-num"><span>${d}</span></div>`;

    let evHtml = evs.map(ev => {
      const glowStyle = ev.glow
        ? ` animation:anniv-pulse-${ev.color.replace('#','')} 2s ease-in-out infinite;`
        : '';
      const timeStr = ev.time ? ev.time.slice(0,5)+' ' : '';
      const glowCls = ev.glow ? ' anniversary-glow' : '';
      const glowInline = ev.glow
        ? `box-shadow:0 0 0 0 ${ev.color}80;`
        : '';
      return `<div class="cal-event${glowCls}" style="background:${ev.color};--glow-color:${ev.color}" onclick="showModal('${ds}',${evs.indexOf(ev)})">${timeStr}${ev.title}</div>`;
    }).join('');

    body.innerHTML += `<div class="${cls}">${numHtml}${evHtml}</div>`;
  }
}

function renderList() {
  const body = document.getElementById('listBody');
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const isCurMonth = today.getFullYear()===curYear && today.getMonth()===curMonth;
  let html = '', todayInserted = false;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const row = schedules.find(s => s.date === ds);
    if (!row) continue;
    const evs = getEvents(row);
    if (!evs.length) continue;

    const dt = new Date(curYear, curMonth, d);
    const w = dt.getDay();
    const isToday = isCurMonth && today.getDate()===d;
    const isPast  = ds < todayStr;

    if (isCurMonth && !todayInserted && ds >= todayStr) {
      html += `<div class="today-divider" id="todayAnchor"><span>TODAY</span></div>`;
      todayInserted = true;
    }

    let badge = 'list-day-badge';
    if (isToday) badge += ' today';
    if (w===0) badge += ' sun';
    if (w===6) badge += ' sat';

    html += `<div class="list-group${isPast?' past':''}">
      <div class="list-date-row">
        <div class="${badge}">${d}</div>
        <div class="list-dow">${DOW[w]}요일${isToday?' · 오늘':''}</div>
      </div>`;

    evs.forEach((ev, i) => {
      const l = TYPE_LABEL[ev.status] || '방송';
      html += `<div class="list-event" onclick="showModal('${ds}',${i})">
        <div class="list-bar" style="background:${ev.color}"></div>
        <div style="flex:1">
          <div class="list-title">${ev.title}</div>
          ${ev.time ? `<div class="list-time">${ev.time.slice(0,5)}</div>` : ''}
        </div>
        <span class="badge" style="background:${ev.color}22;color:${ev.color};border:1px solid ${ev.color}44">${l}</span>
      </div>`;
    });
    html += '</div>';
  }

  if (!html) html = '<div style="text-align:center;padding:60px;color:var(--text-muted);">이번 달 일정이 없어요 🌊</div>';
  body.innerHTML = html;

  setTimeout(() => {
    const a = document.getElementById('todayAnchor');
    if (a) a.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 100);
}

// 날짜 + 이벤트 인덱스로 모달 열기
const modalCache = {};
function showModal(ds, idx) {
  const row = schedules.find(s => s.date === ds);
  if (!row) return;
  const evs = getEvents(row);
  const ev = evs[idx];
  if (!ev) return;

  const dt = new Date(ds+'T00:00:00');
  const l  = TYPE_LABEL[ev.status] || '방송';

  document.getElementById('modalDot').style.background = ev.color;
  document.getElementById('modalType').textContent = l;
  document.getElementById('modalTitle').textContent = ev.title;
  document.getElementById('modalDate').textContent  = `${curYear}년 ${dt.getMonth()+1}월 ${dt.getDate()}일 (${DOW[dt.getDay()]})`;
  document.getElementById('modalTime').textContent  = ev.time ? ev.time.slice(0,5) : '';
  document.getElementById('modalNote').textContent  = ev.note || '';
  document.getElementById('eventModal').classList.add('open');
}

function closeModal(e) { if (e.target===e.currentTarget) document.getElementById('eventModal').classList.remove('open'); }
function changeMonth(o) {
  curMonth += o;
  if (curMonth < 0)  { curMonth=11; curYear--; }
  if (curMonth > 11) { curMonth=0;  curYear++; }
  loadMonth();
}

const obs = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }), { threshold:.1 });
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

init();
</script>
</body>
</html>
