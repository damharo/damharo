<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>담하로</title>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── 리셋 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

/* ── 토큰 ── */
:root{
  --primary:    #285398;
  --primary-lt: #3a6db8;
  --primary-pale:#dde8f7;
  --primary-dk: #1a3a72;
  --primary-deep:#0f2548;
  --accent:     #96a9c7;
  --accent-lt:  #b8c9de;
  --accent-soft:#eaf0f8;
  --bg:         #f4f7fc;
  --surface:    #ffffff;
  --border:     #e2e8f2;
  --shadow:     rgba(40,83,152,.1);
  --text:       #0f2548;
  --text-sub:   #5a6a82;
  --text-mut:   #94a3b8;
}
body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(244,247,252,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-inner{
  max-width:860px;margin:0 auto;
  display:flex;align-items:center;
  padding:0 20px;height:52px;gap:4px;
}
.nav-logo{
  font-family:'Gowun Dodum',sans-serif;
  font-size:1.05rem;font-weight:700;color:var(--primary);
  text-decoration:none;margin-right:auto;
  display:flex;align-items:center;gap:6px;
}
.nav-link{
  text-decoration:none;font-size:13px;font-weight:600;
  color:var(--text-sub);padding:8px 14px;border-radius:20px;
  transition:all .2s;
}
.nav-link:hover,.nav-link.active{background:var(--primary-pale);color:var(--primary);}

/* ── PAGE WRAP ── */
.page-wrap{max-width:860px;margin:0 auto;padding:32px 20px 60px;}

/* ── HEADER ROW ── */
.header-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:10px;
}
.page-title{
  font-family:'Gowun Dodum',sans-serif;
  font-size:22px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.updated-label{
  font-size:12px;color:var(--text-mut);
  background:var(--surface);border:1px solid var(--border);
  padding:4px 12px;border-radius:100px;
}

/* ── 검색 ── */
.search-input{
  width:100%;padding:10px 16px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:13px;color:var(--text);outline:none;
  transition:border-color .2s;font-family:inherit;margin-bottom:20px;
}
.search-input:focus{border-color:var(--primary);}

/* ── MEMBER CARD ── */
.member-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;padding:16px 18px;
  display:flex;gap:14px;align-items:flex-start;
  margin-bottom:10px;transition:all .25s;
  box-shadow:0 2px 8px var(--shadow);
}
.member-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px var(--shadow);
  border-color:var(--accent);
}
.member-info{flex-shrink:0;min-width:90px;}
.member-nick{font-size:15px;font-weight:700;color:var(--text);line-height:1.2;}
.member-id{font-size:11px;color:var(--text-mut);margin-top:2px;}

/* ── TASK TAGS ── */
.task-tags{display:flex;flex-wrap:wrap;gap:6px;flex:1;align-items:flex-start;padding-top:2px;}
.task-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;border-radius:10px;font-size:12px;font-weight:600;
  border:1.5px solid;
}
.task-tag.normal{background:var(--primary-pale);border-color:var(--accent);color:var(--primary-dk);}
.task-tag.event {background:#fde8f0;border-color:#f9a8d4;color:#be185d;}
.task-qty{font-weight:800;}
.task-memo{font-size:11px;opacity:.7;}

/* ── 문의 버튼 ── */
.inquiry-btn{
  display:flex;align-items:center;gap:8px;
  margin:28px auto 0;padding:10px 24px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:100px;font-size:13px;font-weight:600;
  color:var(--text-sub);cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px var(--shadow);font-family:inherit;
}
.inquiry-btn:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-1px);}

/* ── 모달 ── */
.modal-backdrop{
  position:fixed;inset:0;z-index:100;
  background:rgba(15,37,72,.3);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
}
.modal-backdrop.open{display:flex;}
.modal-box{
  background:var(--surface);border-radius:22px;
  padding:28px;max-width:380px;width:90%;
  box-shadow:0 20px 60px rgba(15,37,72,.18);
  border:1.5px solid var(--border);
}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;color:var(--text);font-family:'Gowun Dodum',sans-serif;}
.modal-input{
  width:100%;padding:10px 14px;border-radius:12px;
  border:1.5px solid var(--border);font-family:inherit;
  font-size:13px;color:var(--text);outline:none;margin-bottom:10px;
  transition:border-color .2s;background:var(--bg);
}
.modal-input:focus{border-color:var(--primary);background:var(--surface);}
textarea.modal-input{height:90px;resize:none;}
.modal-submit{
  width:100%;padding:10px;border-radius:12px;
  background:var(--primary);color:#fff;border:none;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .2s;font-family:inherit;
}
.modal-submit:hover{background:var(--primary-dk);}

/* ── 로딩/빈 상태 ── */
.loading{text-align:center;padding:32px;font-size:13px;color:var(--text-mut);}
.empty-box{
  background:var(--surface);border:1.5px dashed var(--border);
  border-radius:16px;padding:32px;
  text-align:center;font-size:13px;color:var(--text-mut);
}

/* ── 스크롤바 ── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px;}

/* ── fade-up ── */
.fade-up{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease;}
.fade-up.visible{opacity:1;transform:translateY(0);}

/* ── 푸터 ── */
.page-footer{
  border-top:1.5px solid var(--border);
  text-align:center;padding:20px;font-size:12px;color:var(--text-mut);
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../" class="nav-logo">🌊 담하로</a>
    <a href="../schedule/" class="nav-link">📅 일정</a>
    <a href="../songbook/" class="nav-link">🎵 노래책</a>
    <a href="../upbo/" class="nav-link active">⚡ 업보</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="header-row fade-up">
    <div class="page-title">⚡ 업보</div>
    <div class="updated-label" id="updatedLabel">갱신일: —</div>
  </div>

  <input class="search-input fade-up" id="searchInput" type="text" placeholder="닉네임 또는 아이디 검색…">

  <div id="loadingState" class="loading">불러오는 중…</div>
  <div id="emptyState" class="empty-box" style="display:none">업보가 없어요 🌊</div>
  <div id="memberList"></div>

  <button class="inquiry-btn fade-up" onclick="openInquiry()">✉️ 업보 문의하기</button>
</div>

<!-- 문의 모달 -->
<div class="modal-backdrop" id="inquiryModal" onclick="closeInquiry(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">✉️ 업보 문의</div>
    <div id="inquiryForm">
      <input class="modal-input" id="iNick" type="text" placeholder="닉네임">
      <textarea class="modal-input" id="iContent" placeholder="문의 내용을 입력해주세요"></textarea>
      <button class="modal-submit" onclick="submitInquiry()">문의 접수</button>
    </div>
    <div id="inquirySuccess" style="display:none;text-align:center;padding:20px;">
      <div style="font-size:2rem;margin-bottom:8px;">✅</div>
      <div style="font-weight:700;color:var(--text);">문의가 접수됐어요!</div>
    </div>
  </div>
</div>

<footer class="page-footer">
  © 2026 담하로 &nbsp;·&nbsp;
  <span>Designed &amp; Developed by <strong>아키텍트 크리에이티브</strong> · <a href="mailto:profile@soop.info" style="color:var(--text-mut);">profile@soop.info</a></span>
</footer>

<script>
const SUPABASE_URL = 'https://mvpwyshztjttmdfbuuea.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12cHd5c2h6dGp0dG1kZmJ1dWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODMyNjgsImV4cCI6MjA5NTc1OTI2OH0.Jdd4nbHouFMbfC10OZfZVSJq_gGPCWIysS1pfeaBP-E';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allMembers = [], memberTasks = {};

function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

async function load() {
  try {
    const { data: settings } = await sb.from('upbo_settings').select('*').eq('key','updated_at').single();
    if (settings) document.getElementById('updatedLabel').textContent = '갱신일: ' + settings.value;

    const { data: members } = await sb.from('upbo_members').select('*').eq('is_hidden', false).order('sort_order').order('created_at');
    const { data: tasks }   = await sb.from('upbo_tasks').select('*, upbo_task_types(*)').gt('quantity', 0);

    document.getElementById('loadingState').style.display = 'none';

    memberTasks = {};
    (tasks || []).forEach(t => {
      if (!memberTasks[t.member_id]) memberTasks[t.member_id] = [];
      memberTasks[t.member_id].push(t);
    });

    allMembers = (members || []).filter(m => memberTasks[m.id]?.length > 0);

    if (!allMembers.length) { document.getElementById('emptyState').style.display = 'block'; return; }
    render(allMembers);
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  }
}

function render(members) {
  const empty = document.getElementById('emptyState');
  const list  = document.getElementById('memberList');
  if (!members.length) { empty.style.display = 'block'; list.innerHTML = ''; return; }
  empty.style.display = 'none';
  list.innerHTML = members.map(m => {
    const tasks = memberTasks[m.id] || [];
    const tagHtml = tasks.map(t => {
      const cls = t.upbo_task_types?.category === 'event' ? 'event' : 'normal';
      return `<span class="task-tag ${cls}">
        ${esc(t.upbo_task_types?.name || '')}
        ${t.quantity > 1 ? `<span class="task-qty">×${t.quantity}</span>` : ''}
        ${t.memo ? `<span class="task-memo">(${esc(t.memo)})</span>` : ''}
      </span>`;
    }).join('');
    return `<div class="member-card fade-up">
      <div class="member-info">
        <div class="member-nick">${esc(m.nickname)}</div>
        ${m.user_id ? `<div class="member-id">(${esc(m.user_id)})</div>` : ''}
      </div>
      <div class="task-tags">${tagHtml || '<span style="color:var(--text-mut);font-size:12px;">업보 없음</span>'}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('#memberList .fade-up').forEach(el => obs.observe(el));
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  render(q ? allMembers.filter(m =>
    m.nickname.toLowerCase().includes(q) || (m.user_id || '').toLowerCase().includes(q)
  ) : allMembers);
});

function openInquiry() {
  document.getElementById('inquiryForm').style.display = 'block';
  document.getElementById('inquirySuccess').style.display = 'none';
  document.getElementById('iNick').value = '';
  document.getElementById('iContent').value = '';
  document.getElementById('inquiryModal').classList.add('open');
}
function closeInquiry(e) {
  if (e.target === e.currentTarget) document.getElementById('inquiryModal').classList.remove('open');
}
async function submitInquiry() {
  const nick = document.getElementById('iNick').value.trim();
  const content = document.getElementById('iContent').value.trim();
  if (!content) return;
  const { error } = await sb.from('upbo_inquiries').insert({ nickname: nick || '익명', content });
  if (error) { alert('접수 실패: ' + error.message); return; }
  document.getElementById('inquiryForm').style.display = 'none';
  document.getElementById('inquirySuccess').style.display = 'block';
  setTimeout(() => document.getElementById('inquiryModal').classList.remove('open'), 2000);
}

const obs = new IntersectionObserver(es => es.forEach(e => {
  if (e.isIntersecting) e.target.classList.add('visible');
}), { threshold: .1 });
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

load();
</script>
</body>
</html>
