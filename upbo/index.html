<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업보 — 담하로</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* ── 탑 배너 ── */
    .upbo-banner {
      background: linear-gradient(120deg, var(--primary-deep) 0%, var(--primary) 100%);
      color: var(--white);
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 0;
    }
    .upbo-banner h2 {
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .upbo-banner p { opacity: .75; font-size: .9rem; }
    .upbo-updated {
      font-size: .8rem;
      opacity: .6;
      margin-top: 8px;
    }

    /* ── 탭 ── */
    .tab-bar {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 14px 20px;
      font-size: .875rem;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all .2s;
    }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ── 랭킹 탭 ── */
    .rank-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .rank-search {
      flex: 1;
      padding: 9px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: .875rem;
      outline: none;
      transition: border-color .2s;
    }
    .rank-search:focus { border-color: var(--primary); }

    /* 랭킹 카드 */
    .rank-list { display: flex; flex-direction: column; gap: 10px; }
    .rank-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform .2s, box-shadow .2s;
    }
    .rank-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
    .rank-num {
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      min-width: 32px;
      text-align: center;
      color: var(--text-muted);
    }
    .rank-num.gold   { color: #f59e0b; }
    .rank-num.silver { color: #94a3b8; }
    .rank-num.bronze { color: #b45309; }
    .rank-info { flex: 1; }
    .rank-name { font-weight: 700; font-size: .95rem; margin-bottom: 2px; }
    .rank-uid  { font-size: .75rem; color: var(--text-muted); }
    .rank-tasks {
      text-align: right;
      font-size: .8rem;
      color: var(--text-muted);
    }
    .rank-total {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      font-family: 'Gowun Dodum', sans-serif;
    }

    /* ── 타입별 탭 ── */
    .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .type-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .type-card-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--primary-deep);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .type-card-cat {
      font-size: .75rem;
      background: var(--accent-soft);
      color: var(--primary-dark);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .type-members {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .type-member-row {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      padding: 4px 0;
      border-bottom: 1px solid var(--gray-200);
    }
    .type-member-row:last-child { border-bottom: none; }
    .type-cnt {
      font-weight: 700;
      color: var(--primary);
    }

    /* ── 문의 탭 ── */
    .inquiry-form {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      max-width: 560px;
      margin: 0 auto;
    }
    .inquiry-form h3 {
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 1.1rem;
      color: var(--primary-deep);
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: .85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
      color: var(--text);
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
    .form-textarea { resize: vertical; min-height: 110px; }
    .form-note { font-size: .78rem; color: var(--text-muted); margin-top: 12px; }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      margin-top: 8px;
      transition: background .2s, transform .2s;
    }
    .submit-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .submit-btn:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }
    .submit-result {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: .9rem;
      text-align: center;
      display: none;
    }
    .submit-result.success { background: #d1fae5; color: #065f46; display: block; }
    .submit-result.error   { background: var(--red-pale); color: var(--red); display: block; }

    /* 로딩 */
    .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--gray-200); border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../" class="nav-logo">🌊 담하로</a>
    <a href="../schedule/" class="nav-link">📅 일정</a>
    <a href="../songbook/" class="nav-link">🎵 노래책</a>
    <a href="../upbo/" class="nav-link active">⚡ 업보</a>
  </div>
</nav>

<!-- 배너 -->
<div class="upbo-banner">
  <h2>⚡ 시청자 업보</h2>
  <p>방송에서 쌓인 업보 현황을 확인하세요</p>
  <div class="upbo-updated" id="upboUpdated"></div>
</div>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('rank')">🏆 랭킹</button>
  <button class="tab-btn" onclick="switchTab('type')">📋 업보 유형별</button>
  <button class="tab-btn" onclick="switchTab('inquiry')">✉️ 업보 문의</button>
</div>

<main class="container">

  <!-- ── 랭킹 탭 ── -->
  <div id="tab-rank">
    <div class="rank-header fade-up">
      <input class="rank-search" id="rankSearch" placeholder="닉네임 검색…" oninput="filterRank()">
    </div>
    <div class="rank-list fade-up" id="rankList">
      <div class="loading"><div class="spinner"></div><br><br>불러오는 중…</div>
    </div>
  </div>

  <!-- ── 유형별 탭 ── -->
  <div id="tab-type" style="display:none">
    <div class="type-grid fade-up" id="typeGrid">
      <div class="loading"><div class="spinner"></div><br><br>불러오는 중…</div>
    </div>
  </div>

  <!-- ── 문의 탭 ── -->
  <div id="tab-inquiry" style="display:none">
    <div class="inquiry-form fade-up">
      <h3>✉️ 업보 문의하기</h3>
      <div class="form-group">
        <label class="form-label">닉네임</label>
        <input class="form-input" id="iqNick" placeholder="방송에서 사용하는 닉네임">
      </div>
      <div class="form-group">
        <label class="form-label">문의 내용</label>
        <textarea class="form-textarea" id="iqContent" placeholder="문의 내용을 입력해 주세요…"></textarea>
      </div>
      <p class="form-note">⚠️ 문의는 관리자만 확인할 수 있으며, 답변은 방송에서 이루어질 수 있습니다.</p>
      <button class="submit-btn" id="iqSubmitBtn" onclick="submitInquiry()">문의 보내기</button>
      <div class="submit-result" id="iqResult"></div>
    </div>
  </div>

</main>

<footer style="background:var(--primary-deep);color:rgba(255,255,255,.45);text-align:center;padding:20px 24px;font-size:.8rem;">
  <p>© 2026 담하로</p>
  <p style="margin-top:6px;font-size:11px;color:rgba(255,255,255,.3);">Designed &amp; Developed by <strong style="color:rgba(255,255,255,.45);">아키텍트 크리에이티브</strong> · <a href="mailto:profile@soop.info" style="color:rgba(255,255,255,.3);text-decoration:none;">profile@soop.info</a></p>
</footer>

<script>
  const SUPABASE_URL = 'https://mvpwyshztjttmdfbuuea.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12cHd5c2h6dGp0dG1kZmJ1dWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODMyNjgsImV4cCI6MjA5NTc1OTI2OH0.Jdd4nbHouFMbfC10OZfZVSJq_gGPCWIysS1pfeaBP-E';

  let members = [], tasks = [], taskTypes = [];
  let rankData = [];
  let rankQuery = '';

  async function sb(path) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    return r.json();
  }

  async function loadAll() {
    [members, tasks, taskTypes] = await Promise.all([
      sb('upbo_members?select=*&is_hidden=eq.false&order=sort_order.asc'),
      sb('upbo_tasks?select=*'),
      sb('upbo_task_types?select=*&order=sort_order.asc')
    ]);
    if (!Array.isArray(members))   members = [];
    if (!Array.isArray(tasks))     tasks = [];
    if (!Array.isArray(taskTypes)) taskTypes = [];

    // 설정 로드 (갱신일)
    try {
      const settings = await sb('upbo_settings?select=*');
      if (Array.isArray(settings)) {
        const upd = settings.find(s => s.key === 'updated_at');
        if (upd) document.getElementById('upboUpdated').textContent = `마지막 갱신: ${upd.value}`;
      }
    } catch(e) {}

    buildRankData();
    renderRank();
  }

  function buildRankData() {
    rankData = members.map(m => {
      const myTasks = tasks.filter(t => t.member_id === m.id);
      const total = myTasks.reduce((sum, t) => sum + (t.quantity || 1), 0);
      const byType = {};
      myTasks.forEach(t => {
        byType[t.type_id] = (byType[t.type_id] || 0) + (t.quantity || 1);
      });
      return { ...m, total, byType, taskCount: myTasks.length };
    });
    rankData.sort((a, b) => b.total - a.total);
  }

  function filterRank() {
    rankQuery = document.getElementById('rankSearch').value.toLowerCase();
    renderRank();
  }

  function renderRank() {
    const list = document.getElementById('rankList');
    const shown = rankData.filter(m => !rankQuery || m.nickname.toLowerCase().includes(rankQuery));
    if (shown.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚡</div><p>업보 기록이 없어요</p></div>`;
      return;
    }
    const rankColors = ['gold', 'silver', 'bronze'];
    list.innerHTML = shown.map((m, i) => {
      const numCls = rankColors[i] || '';
      // 상위 타입 2개
      const topTypes = Object.entries(m.byType)
        .sort((a,b) => b[1]-a[1]).slice(0,2)
        .map(([tid, cnt]) => {
          const t = taskTypes.find(x => x.id === tid);
          return t ? `${t.name} ×${cnt}` : '';
        }).filter(Boolean).join(' · ');
      return `<div class="rank-card">
        <div class="rank-num ${numCls}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${esc(m.nickname)}</div>
          ${m.user_id ? `<div class="rank-uid">@${esc(m.user_id)}</div>` : ''}
          ${topTypes ? `<div class="rank-uid" style="margin-top:2px">${esc(topTypes)}</div>` : ''}
        </div>
        <div class="rank-tasks">
          <div class="rank-total">${m.total}</div>
          <div>건</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderTypeGrid() {
    const grid = document.getElementById('typeGrid');
    if (taskTypes.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><p>등록된 업보 유형이 없어요</p></div>`;
      return;
    }
    grid.innerHTML = taskTypes.map(tt => {
      const relTasks = tasks.filter(t => t.type_id === tt.id);
      const byMember = {};
      relTasks.forEach(t => {
        byMember[t.member_id] = (byMember[t.member_id] || 0) + (t.quantity || 1);
      });
      const sorted = Object.entries(byMember).sort((a,b) => b[1]-a[1]).slice(0,5);
      const rows = sorted.map(([mid, cnt]) => {
        const m = members.find(x => x.id === mid);
        return m ? `<div class="type-member-row"><span>${esc(m.nickname)}</span><span class="type-cnt">${cnt}건</span></div>` : '';
      }).join('');
      const total = relTasks.reduce((s,t) => s + (t.quantity||1), 0);
      return `<div class="type-card">
        <div class="type-card-name">
          ${esc(tt.name)}
          <span class="type-card-cat">${tt.category === 'event' ? '이벤트' : '일반'}</span>
        </div>
        <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:4px">총 ${total}건</div>
        <div class="type-members">
          ${rows || '<div style="font-size:.8rem;color:var(--text-muted);padding:8px 0">기록 없음</div>'}
        </div>
      </div>`;
    }).join('');
  }

  function switchTab(name) {
    ['rank','type','inquiry'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
    });
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', ['rank','type','inquiry'][i] === name);
    });
    if (name === 'type') renderTypeGrid();
  }

  async function submitInquiry() {
    const nick = document.getElementById('iqNick').value.trim();
    const content = document.getElementById('iqContent').value.trim();
    const result = document.getElementById('iqResult');
    const btn = document.getElementById('iqSubmitBtn');
    if (!content) { showResult('error', '문의 내용을 입력해 주세요.'); return; }
    btn.disabled = true;
    btn.textContent = '전송 중…';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/upbo_inquiries`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ nickname: nick || '익명', content })
      });
      if (res.ok || res.status === 201) {
        showResult('success', '문의가 전송되었습니다! 방송에서 확인해 드릴게요 💙');
        document.getElementById('iqNick').value = '';
        document.getElementById('iqContent').value = '';
      } else {
        showResult('error', '전송 중 오류가 발생했습니다.');
      }
    } catch(e) { showResult('error', '네트워크 오류가 발생했습니다.'); }
    btn.disabled = false;
    btn.textContent = '문의 보내기';
  }

  function showResult(type, msg) {
    const el = document.getElementById('iqResult');
    el.className = `submit-result ${type}`;
    el.textContent = msg;
    setTimeout(() => { el.className = 'submit-result'; }, 5000);
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  (async () => {
    await loadAll();
    document.querySelectorAll('.fade-up').forEach(el => {
      new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1 }).observe(el);
    });
  })();
</script>
</body>
</html>
